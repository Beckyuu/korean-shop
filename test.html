<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品上架後台 │ Mina．妝日子</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #d4a373;
      --danger:     #ff4d4f;
      --bg:         #f9f8f6;
      --text:       #333;
      --border:     #ddd;
      --gray-dark:  #555;
      --gray-mid:   #888;
      --gray-light: #fafafa;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ===== 雙欄版面 ===== */
    .page-layout {
      width: 100%;
      max-width: 1360px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 960px) {
      .page-layout { grid-template-columns: 1fr; }
    }

    .admin-container {
      background: #fff;
      width: 100%;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    /* ===== 翻譯助手容器 ===== */
    .translate-container {
      background: #fff;
      width: 100%;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      position: sticky;
      top: 20px;
    }

    .translate-img-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: var(--gray-light);
      transition: all 0.3s;
    }
    .translate-img-area:hover { border-color: var(--primary); background: #fff9f5; }
    .translate-img-area.has-image { border-color: var(--primary); background: #fff9f5; }

    #translate-img-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 6px;
      margin-top: 10px;
      display: none;
    }

    .btn-translate {
      width: 100%;
      padding: 13px;
      background: #6b9e8a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-translate:hover { opacity: 0.88; }
    .btn-translate:disabled { background: #ccc; cursor: not-allowed; opacity: 1; }

    .translate-result-box {
      background: var(--gray-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      min-height: 90px;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.75;
      color: var(--text);
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .btn-copy {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.2s;
      color: var(--gray-dark);
    }
    .btn-copy:hover { background: #f0f0f0; }

    .translate-spinner {
      display: none;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .clear-img-btn {
      margin-top: 6px;
      background: transparent;
      border: 1px solid #ccc;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--gray-dark);
      display: none;
    }
    .clear-img-btn:hover { background: #f5f5f5; }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: var(--primary);
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .required-mark { color: var(--danger); }

    /* 通用輸入元件（含 select） */
    input[type="text"],
    input[type="number"],
    textarea,
    input[type="password"],
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      background-color: #fff;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus, select:focus { border-color: var(--primary); }

    /* select：去除預設樣式，加自訂下箭頭 */
    select {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 12px;
      padding-right: 36px;
    }

    /* 「分類」與「標籤」並排 */
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-row .form-group { flex: 1; margin-bottom: 0; }

    .field-error { border-color: var(--danger) !important; }

    .error-msg {
      display: none;
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 4px;
    }

    textarea { resize: vertical; min-height: 100px; }

    .hint {
      font-size: 0.8rem;
      color: var(--gray-mid);
      margin-top: 4px;
    }

    .form-divider {
      margin-top: 30px;
      border-top: 1px dashed var(--border);
      padding-top: 20px;
    }

    /* --- 動態規格表格 --- */
    .variant-container {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      background: var(--gray-light);
      margin-bottom: 8px;
    }

    .variant-header {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      font-weight: bold;
      font-size: 0.9rem;
      color: var(--gray-dark);
      padding: 0 5px;
    }

    .v-col-name  { flex: 2; }
    .v-col-price { flex: 1; }
    .v-col-btn   { width: 40px; text-align: center; flex-shrink: 0; }

    .variant-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .variant-row input { padding: 10px; margin-bottom: 0; }

    .btn-remove-v {
      width: 40px; height: 40px;
      background: #fff;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .btn-remove-v:hover { background: var(--danger); color: #fff; }
    .btn-remove-v:disabled { border-color: var(--border); color: #ccc; cursor: not-allowed; background: #f5f5f5; }

    .btn-add-v {
      width: 100%; padding: 12px;
      background: transparent;
      border: 2px dashed #ccc;
      color: var(--gray-dark);
      border-radius: 6px;
      cursor: pointer; font-weight: bold;
      transition: all 0.2s;
    }
    .btn-add-v:hover { border-color: var(--primary); color: var(--primary); background: #fff9f5; }

    /* --- 圖片上傳區塊 --- */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: var(--gray-light);
      transition: all 0.3s;
    }
    .upload-area:hover { border-color: var(--primary); background: #fff9f5; }

    .upload-hint-text { margin: 0; color: var(--gray-mid); }

    #file-input { display: none; }

    .preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }

    /* 圖片預覽卡片（可拖曳） */
    .preview-wrapper {
      position: relative;
      display: inline-block;
      cursor: grab;
    }
    .preview-wrapper:active { cursor: grabbing; }

    /* 拖曳中：半透明 */
    .preview-wrapper.dragging { opacity: 0.35; }

    /* 拖曳放置目標：金框高亮 */
    .preview-wrapper.drag-over .preview-box {
      border: 2px solid var(--primary);
      box-shadow: 0 0 8px rgba(212, 163, 115, 0.45);
    }

    .preview-box {
      width: 80px; height: 80px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid #eee;
      display: block;
      transition: border 0.15s, box-shadow 0.15s;
    }

    /* 圖片順序角標（主圖 / 2 / 3 …） */
    .order-badge {
      position: absolute;
      bottom: 4px; left: 4px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 0.62rem;
      font-weight: bold;
      padding: 1px 5px;
      border-radius: 3px;
      pointer-events: none;
      letter-spacing: 0.5px;
    }

    .delete-btn {
      position: absolute;
      top: -6px; right: -6px;
      background-color: var(--danger);
      color: white;
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* --- 按鈕 --- */
    .btn-submit {
      width: 100%; padding: 15px;
      background: var(--primary);
      color: white; border: none;
      border-radius: 6px;
      font-size: 1.1rem; font-weight: bold;
      cursor: pointer; margin-top: 10px;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; opacity: 1; }

    .btn-cancel {
      background: #aaa; color: white; border: none;
      padding: 10px; border-radius: 6px;
      cursor: pointer; width: 100%; margin-top: 10px;
      font-weight: bold; display: none;
    }

    .btn-load {
      background: var(--gray-dark); color: white; border: none;
      padding: 10px 20px; border-radius: 6px;
      cursor: pointer; margin-bottom: 20px;
      font-weight: bold; width: 100%; font-size: 1rem;
      transition: background 0.3s;
    }
    .btn-load:hover { background: #333; }

    /* --- 載入中遮罩 --- */
    #loading-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.85);
      z-index: 1000;
      justify-content: center; align-items: center; flex-direction: column;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
    }

    .loading-label { margin-top: 15px; font-weight: bold; color: var(--gray-dark); }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* --- 商品列表彈窗 --- */
    #product-list-modal {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center; align-items: center;
    }

    .modal-content {
      background: #fff; width: 90%; max-width: 600px;
      max-height: 80vh; overflow-y: auto;
      padding: 20px; border-radius: 12px;
    }

    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 15px;
    }
    .modal-header h3 { color: var(--text); }

    .modal-close-btn {
      border: none; background: transparent;
      font-size: 1.5rem; cursor: pointer;
      color: var(--gray-mid); line-height: 1;
    }

    .product-item {
      padding: 15px; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.2s;
    }
    .product-item:hover { background: #f9f9f9; }

    .product-item-title { font-weight: bold; color: var(--text); margin-bottom: 5px; }
    .product-item-meta  { font-size: 0.8rem; color: var(--gray-mid); }

    .product-item-btn {
      background: var(--primary); color: #fff; border: none;
      padding: 6px 12px; border-radius: 4px;
      cursor: pointer; font-size: 0.85rem; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-label" id="loading-text">處理中...</p>
  </div>

  <div id="product-list-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>選擇要編輯的商品</h3>
        <button class="modal-close-btn" onclick="document.getElementById('product-list-modal').style.display='none'">×</button>
      </div>
      <div id="product-list-container"></div>
    </div>
  </div>

  <div class="page-layout">
  <div class="admin-container">
    <h2 id="form-title">✦ 發布新商品 ✦</h2>

    <button type="button" class="btn-load" onclick="loadProducts()">📋 管理現有商品 (點此讀取)</button>

    <form id="uploadForm" novalidate>

      <div class="form-group">
        <label>商品名稱 <span class="required-mark">*</span></label>
        <textarea id="p_name" style="min-height: 70px;"
          placeholder="例如：韓國超水潤光澤唇釉&#10;(字太長會自動往下換行，也可以按 Enter 強制斷行)"></textarea>
        <span class="error-msg" id="err-name">請輸入商品名稱</span>
      </div>

      <div class="form-group">
        <label>設定規格與價格 <span class="required-mark">*</span></label>
        <div class="variant-container">
          <div class="variant-header">
            <div class="v-col-name">款式 / 規格名稱</div>
            <div class="v-col-price">原價</div>
            <div class="v-col-price">售價 (選填)</div>
            <div class="v-col-btn"></div>
          </div>
          <div id="variant-list"></div>
          <button type="button" class="btn-add-v" onclick="addVariantRow('', '', '')">+ 新增規格</button>
        </div>
        <span class="error-msg" id="err-variants">每個規格都需填寫名稱，且原價需大於 0</span>
      </div>

      <div class="form-group">
        <label>商品詳細說明 / 內容物</label>
        <textarea id="p_desc" placeholder="請直接輸入文字，想換行就按 Enter！"></textarea>
      </div>

      <!-- ===== Task 1：補齊 F / G / H 欄 ===== -->
      <div class="form-row">
        <div class="form-group">
          <label>商品分類 <span class="required-mark">*</span></label>
          <select id="p_category">
            <option value="全部商品">全部商品（未分類）</option>
            <option value="新品上架">新品上架</option>
            <option value="WAKEMAKE x Hello Kitty">WAKEMAKE x Hello Kitty</option>
            <option value="ILLIYOON x 蒙奇奇">ILLIYOON x 蒙奇奇</option>
          </select>
        </div>
        <div class="form-group">
          <label>商品標籤 (Tag)</label>
          <select id="p_tag">
            <option value="">無</option>
            <option value="NEW">NEW</option>
            <option value="HOT">HOT</option>
            <option value="SALE">SALE</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>收單時間</label>
        <input type="text" id="p_deadline" placeholder="例如：2/28 結單、3/15 前下單">
        <p class="hint">可直接輸入短文字。留空則前台不顯示收單提醒</p>
      </div>
      <!-- ===== Task 1 結束 ===== -->

      <div class="form-group">
        <label>商品圖片 (1 ~ 5 張) <span class="required-mark">*</span></label>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
          <p class="upload-hint-text">點擊這裡選擇圖片 📸</p>
          <p class="hint" id="img-hint">第一張為主圖。上傳後可拖曳圖片調整順序。最多 5 張</p>
        </div>
        <input type="file" id="file-input" multiple accept="image/*" onchange="handleFileSelect()">
        <div class="preview-container" id="preview-box"></div>
        <span class="error-msg" id="err-img">請至少上傳一張商品圖片</span>
      </div>

      <div class="form-group form-divider">
        <label>上架防護密碼 <span class="required-mark">*</span></label>
        <input type="password" id="p_password" placeholder="輸入密碼以驗證身分（至少 4 個字元）">
        <span class="error-msg" id="err-pwd">密碼至少需要 4 個字元</span>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">發布商品至官網</button>
      <button type="button" class="btn-cancel" id="cancel-btn" onclick="cancelEdit()">取消編輯 (返回新增模式)</button>
    </form>
  </div><!-- /.admin-container (左欄結束) -->

  <!-- ===== 右欄：即時翻譯助手 ===== -->
  <div class="translate-container">
    <h2 style="text-align:center; margin-bottom:20px; color:#6b9e8a;">✦ 即時翻譯助手 ✦</h2>

    <div class="form-group">
      <label>貼上外文文字（選填）</label>
      <textarea id="t_text" style="min-height:110px;"
        placeholder="可貼上外文商品名稱、規格說明等，支援日文、韓文、英文…"></textarea>
    </div>

    <div class="form-group">
      <label>上傳商品圖片（選填）</label>
      <div class="translate-img-area" id="t_img_area"
        onclick="document.getElementById('t_file_input').click()"
        ondragover="event.preventDefault()"
        ondrop="handleTranslateImgDrop(event)">
        <p style="color:var(--gray-mid); margin:0;">點擊上傳 或 Ctrl+V 貼上剪貼簿圖片</p>
        <p class="hint">支援 JPG / PNG / WEBP</p>
        <img id="translate-img-preview" src="" alt="預覽">
      </div>
      <input type="file" id="t_file_input" accept="image/*" style="display:none" onchange="handleTranslateFileSelect()">
      <button class="clear-img-btn" id="t_clear_btn" onclick="clearTranslateImg()">✕ 移除圖片</button>
    </div>

    <button class="btn-translate" id="translate-btn" onclick="doTranslate()">
      <div class="translate-spinner" id="translate-spinner"></div>
      <span id="translate-btn-text">✨ 開始翻譯</span>
    </button>

    <div class="form-group" style="margin-top:20px;">
      <div class="result-header">
        <label style="margin:0;">翻譯結果</label>
        <button class="btn-copy" id="copy-btn" onclick="copyTranslateResult()" style="display:none;">複製結果</button>
      </div>
      <div class="translate-result-box" id="translate-result">翻譯結果會顯示在這裡…</div>
    </div>
  </div><!-- /.translate-container (右欄結束) -->

  </div><!-- /.page-layout -->

<script>
  // ==========================================
  // ⚠️ 設定區（本機使用，不對外公開）
  // ==========================================
  const IMAGEKIT_PRIVATE_KEY = "private_OdpN9xBZuVL4wcTpDS00qYzVT4Q=";
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwk8k7fACb3jG5Dbsn-qQkeWQUstvuwzOZz76Fhd25J5M27LwZIV0sjk5Im41hcZV3X/exec";

  let selectedFiles       = [];   // 壓縮後的 File 物件（與 previewUrls 同步）
  let previewUrls         = [];   // data URL，用於同步渲染預覽，不再需要 FileReader
  let dragSrcIndex        = null; // 拖曳來源的陣列索引
  let currentEditRowIndex = null; // null = 新增模式；有值 = 編輯模式
  let existingImages      = [];

  window.onload = function () { addVariantRow('', '', ''); };

  // ============================================================
  // 動態規格表單
  // ============================================================
  function addVariantRow(name, price, promo) {
    const list = document.getElementById('variant-list');
    const row  = document.createElement('div');
    row.className = 'variant-row';

    const nameInput  = Object.assign(document.createElement('input'), {
      type: 'text', className: 'v-name v-col-name',
      placeholder: '例如：#01 附蝴蝶結', value: name
    });
    const priceInput = Object.assign(document.createElement('input'), {
      type: 'number', className: 'v-price v-col-price',
      placeholder: '原價', min: '1', value: price
    });
    const promoInput = Object.assign(document.createElement('input'), {
      type: 'number', className: 'v-promo v-col-price',
      placeholder: '售價', min: '1', value: promo
    });
    const removeBtn = Object.assign(document.createElement('button'), {
      type: 'button', className: 'btn-remove-v v-col-btn', textContent: '×'
    });
    removeBtn.onclick = function () { removeVariant(this); };

    row.append(nameInput, priceInput, promoInput, removeBtn);
    list.appendChild(row);
    updateRemoveButtons();
  }

  function removeVariant(btn) {
    btn.parentElement.remove();
    updateRemoveButtons();
  }

  function updateRemoveButtons() {
    const btns = document.querySelectorAll('.btn-remove-v');
    btns.forEach(b => b.disabled = btns.length === 1);
  }

  // ============================================================
  // Task 2a：圖片壓縮（Canvas API）
  // ============================================================

  /** 讀取 File，回傳 data URL */
  function readAsDataURL(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  /**
   * 等比例壓縮圖片至最大寬度 maxWidthPx，並控制在 maxSizeKB 以內。
   * 若圖片本身已夠小，直接回傳原始 File。
   */
  async function compressImage(file, maxWidthPx = 800, maxSizeKB = 500) {
    if (file.size <= maxSizeKB * 1024) return file; // 已符合大小，免壓縮

    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = function (e) {
        const img = new Image();
        img.onload = function () {
          let w = img.naturalWidth;
          let h = img.naturalHeight;

          // 等比例縮小至 maxWidthPx
          if (w > maxWidthPx) {
            h = Math.round(h * maxWidthPx / w);
            w = maxWidthPx;
          }

          const canvas = document.createElement('canvas');
          canvas.width  = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);

          // 漸進降低品質直到符合大小限制
          // base64 長度 ≈ 二進位大小 × 1.37（base64 編碼 overhead）
          const maxBase64Len = maxSizeKB * 1024 * 1.37;
          let quality = 0.9;
          let dataUrl = canvas.toDataURL('image/jpeg', quality);
          while (dataUrl.length > maxBase64Len && quality > 0.2) {
            quality  = Math.round((quality - 0.1) * 10) / 10;
            dataUrl  = canvas.toDataURL('image/jpeg', quality);
          }

          // 將 data URL 轉回 File 物件
          const byteStr = atob(dataUrl.split(',')[1]);
          const buf     = new Uint8Array(byteStr.length);
          for (let i = 0; i < byteStr.length; i++) buf[i] = byteStr.charCodeAt(i);

          resolve(new File([buf], file.name.replace(/\.[^/.]+$/, '.jpg'), { type: 'image/jpeg' }));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ============================================================
  // 圖片選取（壓縮後存入平行陣列）
  // ============================================================
  async function handleFileSelect() {
    const input    = document.getElementById('file-input');
    const newFiles = Array.from(input.files);
    input.value    = "";

    if (selectedFiles.length + newFiles.length > 5) {
      alert("最多只能上傳 5 張圖片喔！");
      return;
    }

    showLoading(`壓縮圖片中...`);
    for (let i = 0; i < newFiles.length; i++) {
      showLoading(`壓縮圖片中 (${i + 1} / ${newFiles.length})...`);
      const compressed = await compressImage(newFiles[i]);
      const url        = await readAsDataURL(compressed);
      selectedFiles.push(compressed);
      previewUrls.push(url);
    }
    hideLoading();

    setImgHint("⚠️ 你已選取新圖片，發布後將覆蓋此商品原本的圖片。", "var(--danger)");
    renderPreviews();
  }

  // ============================================================
  // Task 2b：帶拖曳排序的圖片預覽渲染
  // ============================================================
  function renderPreviews() {
    const box = document.getElementById('preview-box');
    box.innerHTML = "";

    previewUrls.forEach((url, index) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'preview-wrapper';
      wrapper.draggable = true;

      // ── 拖曳事件 ──
      wrapper.addEventListener('dragstart', function (e) {
        dragSrcIndex = index;
        e.dataTransfer.effectAllowed = 'move';
        // 延遲加 class，讓瀏覽器先截圖拖曳 ghost
        setTimeout(() => wrapper.classList.add('dragging'), 0);
      });
      wrapper.addEventListener('dragend', function () {
        wrapper.classList.remove('dragging');
      });
      wrapper.addEventListener('dragover', function (e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        wrapper.classList.add('drag-over');
      });
      wrapper.addEventListener('dragleave', function () {
        wrapper.classList.remove('drag-over');
      });
      wrapper.addEventListener('drop', function (e) {
        e.preventDefault();
        wrapper.classList.remove('drag-over');
        const dropIndex = index; // forEach closure 捕捉目標索引
        if (dragSrcIndex !== null && dragSrcIndex !== dropIndex) {
          // 同步交換兩個平行陣列（保持 File 與 URL 一致）
          [selectedFiles[dragSrcIndex], selectedFiles[dropIndex]] =
            [selectedFiles[dropIndex], selectedFiles[dragSrcIndex]];
          [previewUrls[dragSrcIndex], previewUrls[dropIndex]] =
            [previewUrls[dropIndex], previewUrls[dragSrcIndex]];
          dragSrcIndex = null;
          renderPreviews(); // 重繪，更新主圖 badge 順序
        }
      });

      // ── 圖片（設 draggable=false 避免瀏覽器對 img 的預設拖曳行為） ──
      const img = Object.assign(document.createElement('img'), {
        src: url, className: 'preview-box', draggable: false
      });

      // ── 順序角標 ──
      const badge = document.createElement('div');
      badge.className   = 'order-badge';
      badge.textContent = index === 0 ? '主圖' : String(index + 1);

      // ── 刪除按鈕 ──
      const del = Object.assign(document.createElement('span'), {
        className: 'delete-btn', textContent: '×'
      });
      del.onclick = function (e) {
        e.stopPropagation();
        deleteSelectedFile(index);
      };

      wrapper.append(img, badge, del);
      box.appendChild(wrapper);
    });
  }

  function deleteSelectedFile(index) {
    selectedFiles.splice(index, 1);
    previewUrls.splice(index, 1);

    if (selectedFiles.length === 0 && currentEditRowIndex !== null) {
      setImgHint("💡 目前保留舊圖片。若要修改請重新上傳。", "var(--gray-mid)");
      renderOldImages();
      return;
    }
    renderPreviews();
  }

  /** 編輯模式：顯示既有圖片（僅供參考，不可拖曳） */
  function renderOldImages() {
    const box = document.getElementById('preview-box');
    box.innerHTML = "";
    existingImages.forEach((url, i) => {
      if (!url) return;
      const wrapper = document.createElement('div');
      wrapper.className    = 'preview-wrapper';
      wrapper.style.cursor = 'default';

      const img = Object.assign(document.createElement('img'), { src: url, className: 'preview-box' });

      const badge = document.createElement('div');
      badge.className   = 'order-badge';
      badge.textContent = i === 0 ? '主圖' : String(i + 1);

      wrapper.append(img, badge);
      box.appendChild(wrapper);
    });
  }

  function setImgHint(text, color) {
    const hint = document.getElementById('img-hint');
    hint.textContent = text;
    hint.style.color = color || '';
  }

  // ============================================================
  // 防呆驗證
  // ============================================================
  function showError(id, show) {
    const el = document.getElementById(id);
    if (el) el.style.display = show ? 'block' : 'none';
  }

  function validateForm() {
    let valid = true;

    // 1. 商品名稱不得空白
    const nameEmpty = document.getElementById('p_name').value.trim() === '';
    document.getElementById('p_name').classList.toggle('field-error', nameEmpty);
    showError('err-name', nameEmpty);
    if (nameEmpty) valid = false;

    // 2. 每個規格：名稱不得空、原價需 > 0
    let variantError = false;
    document.querySelectorAll('.variant-row').forEach(row => {
      const vNameEl  = row.querySelector('.v-name');
      const vPriceEl = row.querySelector('.v-price');
      const nameErr  = vNameEl.value.trim() === '';
      const priceErr = isNaN(parseFloat(vPriceEl.value)) || parseFloat(vPriceEl.value) <= 0;
      vNameEl.classList.toggle('field-error', nameErr);
      vPriceEl.classList.toggle('field-error', priceErr);
      if (nameErr || priceErr) variantError = true;
    });
    showError('err-variants', variantError);
    if (variantError) valid = false;

    // 3. 圖片（新增模式必填）
    const needImg = currentEditRowIndex === null && selectedFiles.length === 0;
    showError('err-img', needImg);
    if (needImg) valid = false;

    // 4. 密碼至少 4 個字元
    const pwdErr = document.getElementById('p_password').value.length < 4;
    document.getElementById('p_password').classList.toggle('field-error', pwdErr);
    showError('err-pwd', pwdErr);
    if (pwdErr) valid = false;

    return valid;
  }

  // ============================================================
  // 讀取現有商品
  // ============================================================
  async function loadProducts() {
    const pwd = document.getElementById('p_password').value;
    if (pwd.length < 4) {
      alert("請先在下方填寫「上架防護密碼」（至少 4 個字元）才能讀取商品喔！");
      return;
    }
    showLoading("正在從試算表抓取商品...");
    try {
      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "getProducts", password: pwd })
      });
      const result = await response.json();

      if (result.status === "success") {
        const container = document.getElementById('product-list-container');
        container.innerHTML = "";

        result.data.reverse().forEach(p => {
          const item  = document.createElement('div');
          item.className = 'product-item';

          const info  = document.createElement('div');
          const title = Object.assign(document.createElement('div'), {
            className: 'product-item-title',
            textContent: p.name.replace(/<br>/g, " ")
          });
          const meta = Object.assign(document.createElement('div'), {
            className: 'product-item-meta',
            // 在列表中順帶顯示分類與標籤，方便辨識
            textContent: `NT$ ${p.price}　｜　${p.category || '未分類'}　｜　${p.tag || '無標籤'}`
          });
          const btn = Object.assign(document.createElement('button'), {
            className: 'product-item-btn', textContent: '編輯'
          });
          btn.onclick = (function (product) {
            return function () { startEdit(product); };
          })(p);

          info.append(title, meta);
          item.append(info, btn);
          container.appendChild(item);
        });

        document.getElementById('product-list-modal').style.display = 'flex';
      } else {
        alert("讀取失敗：" + result.message);
      }
    } catch (error) {
      alert("發生錯誤：" + error);
    } finally {
      hideLoading();
    }
  }

  // ============================================================
  // 進入編輯模式
  // ============================================================
  function startEdit(p) {
    document.getElementById('product-list-modal').style.display = 'none';

    currentEditRowIndex = p.rowIndex;
    existingImages      = p.images || [];

    document.getElementById('p_name').value = p.name ? p.name.replace(/<br>/g, "\n") : "";
    document.getElementById('p_desc').value = p.desc ? p.desc.replace(/<br>/g, "\n") : "";

    // ✅ Task 1：填入分類、標籤、收單時間
    document.getElementById('p_category').value = p.category || '全部商品';
    document.getElementById('p_tag').value       = p.tag      || '';
    document.getElementById('p_deadline').value  = p.deadline || '';

    document.getElementById('variant-list').innerHTML = "";
    if (p.specs && p.specs.includes('::')) {
      p.specs.split('|').forEach(part => {
        const chunks = part.split('::');
        addVariantRow(
          chunks[0] ? chunks[0].trim() : "",
          chunks[1] ? chunks[1].trim() : "",
          chunks[2] ? chunks[2].trim() : ""
        );
      });
    } else {
      addVariantRow(p.specs || "單一款式", p.price || "", p.promo || "");
    }

    selectedFiles = [];
    previewUrls   = [];
    renderOldImages();
    setImgHint("💡 目前保留舊圖片。若要修改請重新選取圖片 (將完全覆蓋舊圖)。", "var(--gray-mid)");

    document.getElementById('form-title').textContent = "✏️ 編輯商品模式";
    document.getElementById('submit-btn').textContent = "更新此商品";
    document.getElementById('cancel-btn').style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ============================================================
  // 取消編輯
  // ============================================================
  function cancelEdit() {
    currentEditRowIndex = null;
    existingImages      = [];
    selectedFiles       = [];
    previewUrls         = [];

    document.getElementById('uploadForm').reset();
    document.getElementById('variant-list').innerHTML = "";
    addVariantRow('', '', '');
    document.getElementById('preview-box').innerHTML = "";

    document.querySelectorAll('.field-error').forEach(el => el.classList.remove('field-error'));
    document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

    document.getElementById('form-title').textContent = "✦ 發布新商品 ✦";
    document.getElementById('submit-btn').textContent = "發布商品至官網";
    document.getElementById('cancel-btn').style.display = "none";
    setImgHint("第一張為主圖。上傳後可拖曳圖片調整順序。最多 5 張", "");
  }

  // ============================================================
  // 載入遮罩輔助
  // ============================================================
  function showLoading(msg) {
    document.getElementById('loading-text').textContent = msg || "處理中...";
    document.getElementById('loading-overlay').style.display = 'flex';
  }
  function hideLoading() {
    document.getElementById('loading-overlay').style.display = 'none';
  }

  // ============================================================
  // 送出表單
  // ============================================================
  document.getElementById('uploadForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    if (!validateForm()) return;

    let variantArray = [];
    let firstPrice = "", firstPromo = "";
    document.querySelectorAll('.variant-row').forEach((row, index) => {
      const vName  = row.querySelector('.v-name').value.trim();
      const vPrice = row.querySelector('.v-price').value.trim();
      const vPromo = row.querySelector('.v-promo').value.trim();
      variantArray.push(`${vName}::${vPrice}::${vPromo}`);
      if (index === 0) { firstPrice = vPrice; firstPromo = vPromo; }
    });
    const packedSpecs = variantArray.join(' | ');

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    showLoading("處理中...");

    try {
      let finalImageUrls = existingImages;

      if (selectedFiles.length > 0) {
        const authHeader   = 'Basic ' + btoa(IMAGEKIT_PRIVATE_KEY + ":");
        const newImageUrls = [];

        for (let i = 0; i < selectedFiles.length; i++) {
          showLoading(`上傳圖片至 ImageKit (${i + 1} / ${selectedFiles.length})...`);
          const formData = new FormData();
          formData.append('file',     selectedFiles[i]);
          formData.append('fileName', selectedFiles[i].name);
          formData.append('folder',   '/MinaShop');

          const imgkitRes  = await fetch('https://upload.imagekit.io/api/v1/files/upload', {
            method: 'POST',
            headers: { 'Authorization': authHeader },
            body: formData
          });
          const imgkitData = await imgkitRes.json();

          if (imgkitRes.ok) {
            newImageUrls.push(imgkitData.url);
          } else {
            throw new Error(`第 ${i + 1} 張圖片上傳失敗：${imgkitData.message || '未知錯誤'}`);
          }
        }
        finalImageUrls = newImageUrls;
      }

      showLoading("資料寫入 Google 試算表中...");

      const payload = {
        action:    currentEditRowIndex !== null ? "update" : "add",
        rowIndex:  currentEditRowIndex,
        password:  document.getElementById('p_password').value,
        name:      document.getElementById('p_name').value.trim().replace(/\n/g, "<br>"),
        specs:     packedSpecs,
        price:     firstPrice,
        promo:     firstPromo,
        desc:      document.getElementById('p_desc').value.replace(/\n/g, "<br>"),
        // ✅ Task 1：寫入 F / G / H 欄
        category:  document.getElementById('p_category').value,
        tag:       document.getElementById('p_tag').value,
        deadline:  document.getElementById('p_deadline').value.trim(),
        images:    finalImageUrls
      };

      const response = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
      const result   = await response.json();

      if (result.status === "success") {
        alert(currentEditRowIndex !== null ? "🎉 商品更新成功！" : "🎉 恭喜！商品上架成功！");
        cancelEdit();
      } else {
        alert("❌ 失敗：" + result.message);
      }
    } catch (error) {
      console.error(error);
      alert("發生錯誤：" + error.message);
    } finally {
      hideLoading();
      submitBtn.disabled = false;
    }
  });

  // ============================================================
  // 即時翻譯助手
  // ============================================================

  let translateImgBase64 = null;  // { mimeType, data }

  /** 共用：將 File 讀為 base64 */
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => {
        const dataUrl = e.target.result;
        const mimeType = dataUrl.split(';')[0].replace('data:', '');
        const data     = dataUrl.split(',')[1];
        resolve({ mimeType, data });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  /** 顯示翻譯用圖片預覽 */
  function showTranslatePreview(src) {
    const preview = document.getElementById('translate-img-preview');
    preview.src           = src;
    preview.style.display = 'block';
    document.getElementById('t_img_area').classList.add('has-image');
    document.getElementById('t_clear_btn').style.display = 'inline-block';
  }

  /** 從 file input 讀取 */
  async function handleTranslateFileSelect() {
    const input = document.getElementById('t_file_input');
    if (!input.files[0]) return;
    translateImgBase64 = await fileToBase64(input.files[0]);
    showTranslatePreview(URL.createObjectURL(input.files[0]));
    input.value = '';
  }

  /** 拖曳放置 */
  async function handleTranslateImgDrop(e) {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    translateImgBase64 = await fileToBase64(file);
    showTranslatePreview(URL.createObjectURL(file));
  }

  /** 移除圖片 */
  function clearTranslateImg() {
    translateImgBase64 = null;
    const preview = document.getElementById('translate-img-preview');
    preview.src           = '';
    preview.style.display = 'none';
    document.getElementById('t_img_area').classList.remove('has-image');
    document.getElementById('t_clear_btn').style.display = 'none';
  }

  /** Ctrl+V 貼上剪貼簿圖片 */
  document.addEventListener('paste', async function (e) {
    const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
    if (!item) return;
    const file = item.getAsFile();
    translateImgBase64 = await fileToBase64(file);
    showTranslatePreview(URL.createObjectURL(file));
  });

  /** 執行翻譯 */
  async function doTranslate() {
    const text = document.getElementById('t_text').value.trim();
    if (!text && !translateImgBase64) {
      alert('請輸入文字或上傳圖片後再翻譯喔！');
      return;
    }

    // Loading 狀態
    const btn     = document.getElementById('translate-btn');
    const spinner = document.getElementById('translate-spinner');
    const btnText = document.getElementById('translate-btn-text');
    btn.disabled        = true;
    spinner.style.display = 'block';
    btnText.textContent = '翻譯中…';

    const resultBox = document.getElementById('translate-result');
    resultBox.textContent = '翻譯中，請稍候…';
    document.getElementById('copy-btn').style.display = 'none';

    try {
      const payload = {
        action: 'translate',
        text:   text,
        image:  translateImgBase64   // null 或 { mimeType, data }
      };

      const res    = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
      const result = await res.json();

      if (result.status === 'success') {
        resultBox.textContent = result.translated;
        document.getElementById('copy-btn').style.display = 'inline-block';
      } else {
        resultBox.textContent = '❌ 翻譯失敗：' + result.message;
      }
    } catch (err) {
      resultBox.textContent = '❌ 發生錯誤：' + err.message;
    } finally {
      btn.disabled          = false;
      spinner.style.display = 'none';
      btnText.textContent   = '✨ 開始翻譯';
    }
  }

  /** 一鍵複製翻譯結果 */
  function copyTranslateResult() {
    const text = document.getElementById('translate-result').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '已複製！';
      setTimeout(() => { btn.textContent = '複製結果'; }, 1800);
    });
  }
</script>
